<div class="bg-white shadow rounded p-4 mb-4">
  <h2 class="text-xl font-bold text-gray-700 mb-4">
    📊 Tableau de bord
  </h2>

  <div class="grid grid-cols-3 gap-4">

    <!-- Total projets -->
    <div class="bg-blue-50 border border-blue-200 rounded p-3 text-center">
      <p class="text-3xl font-bold text-blue-600">
        {{ getTotalProjets() }}
      </p>
      <p class="text-sm text-gray-500">Projets</p>
    </div>

    <!-- Total tâches -->
    <div class="bg-purple-50 border border-purple-200 rounded p-3 text-center">
      <p class="text-3xl font-bold text-purple-600">
        {{ getTotalTaches() }}
      </p>
      <p class="text-sm text-gray-500">Tâches</p>
    </div>

    <!-- Progression -->
    <div class="bg-green-50 border border-green-200 rounded p-3 text-center">
      <p class="text-3xl font-bold text-green-600">
        {{ getProgressionGlobale() }}%
      </p>
      <p class="text-sm text-gray-500">Progression</p>
    </div>

  </div>

  <!-- Graphique circulaire -->
  <div class="mt-8 flex justify-center">
    
    <div
      class="relative w-40 h-40 rounded-full flex items-center justify-center shadow-md transition-all duration-500"
      [style.background]="getCircleProgress()"
    >

      <!-- cercle intérieur -->
      <div class="w-28 h-28 bg-white rounded-full flex items-center justify-center shadow-inner">
        <span class="text-2xl font-bold text-green-600">
          {{ getProgressionGlobale() }}%
        </span>
      </div>

    </div>

  </div>

  <p class="text-center text-sm text-gray-500 mt-3">
    Progression globale des tâches
  </p>

</div>
