<div class="mt-2 space-y-2">

  @if (tasks.length === 0) {
    <p class="text-gray-400 italic">Aucune tâche</p>
  } @else {
    @for (task of tasks; track task.title) {
      <div
        class="border-l-4 pl-3 py-2 rounded"
        [appHighlightStatus]="task.status">

        <!-- titre avec couleur selon priorité -->
        <p class="font-medium" [class]="task.priority | priorityColor">
          {{ task.title }}
        </p>
        <p class="text-sm text-gray-500">Priorité : {{ task.priority }}</p>
        <p class="text-sm text-gray-500">Statut : {{ task.status }}</p>
      </div>
    }
  }

</div>
