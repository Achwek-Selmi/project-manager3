<div class="p-4 space-y-4">

  <!-- Champ de recherche two-way binding -->
  <input
    [(ngModel)]="searchTerm"
    placeholder="Rechercher un projet..."
    class="w-full border rounded px-3 py-2 mb-4"/>

  @for (project of filteredProjects; track project.name) {
    <div class="bg-white shadow rounded p-4">
      <h2 class="text-xl font-bold">{{ project.name }}</h2>
      <p class="text-gray-600">{{ project.description }}</p>
      <span class="text-sm text-blue-500">{{ project.status }}</span>

      <button
        (click)="selectProject(project)"
        class="mt-2 ml-2 px-4 py-1 bg-blue-500 text-white rounded hover:bg-blue-600">
        Voir détails
      </button>

      <app-task-list [tasks]="project.tasks"></app-task-list>
    </div>
  }

  <!-- Message si aucun projet trouvé -->
  @if (filteredProjects.length === 0) {
    <p class="text-red-400 italic">Aucun projet trouvé</p>
  }

  @if (selectedProject) {
    <app-project-detail [project]="selectedProject"></app-project-detail>
  }

</div>
