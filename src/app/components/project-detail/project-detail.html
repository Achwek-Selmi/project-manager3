<div class="bg-blue-50 border border-blue-200 rounded p-4 mt-4">

  <h2 class="text-2xl font-bold text-blue-700">{{ project.name }}</h2>
  <p class="text-gray-700">{{ project.description }}</p>
  <p class="text-sm text-gray-500">Statut : {{ project.status }}</p>
  <p class="text-sm text-gray-500">Créé le : {{ project.createdAt | date:'dd/MM/yyyy' }}</p>

  <!-- Barre de progression -->
  <div class="mt-3">
    <p class="text-sm font-medium text-gray-600">
      Progression : {{ getProgress() }}%
    </p>
    <div class="w-full bg-gray-200 rounded-full h-3 mt-1">
      <div
        class="bg-blue-500 h-3 rounded-full"
        [style.width.%]="getProgress()">
      </div>
    </div>
  </div>

  <app-task-list [tasks]="project.tasks"></app-task-list>

</div>
